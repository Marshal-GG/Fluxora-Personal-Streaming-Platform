name: Secret Scan

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan every commit, not just the diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required only when running under a GitHub
          # organization. For a personal repo it can be left unset.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
