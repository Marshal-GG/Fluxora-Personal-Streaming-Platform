name: Web Landing — Build & Deploy

on:
  push:
    branches: [main, uat]
    paths:
      - 'apps/web_landing/**'
  pull_request:
    paths:
      - 'apps/web_landing/**'

concurrency:
  # Don't cancel deploy-production runs in flight — they're tied to a release;
  # cancel only build / preview / uat duplicates on the same branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web_landing/package-lock.json

      - name: Install dependencies
        working-directory: apps/web_landing
        run: npm ci

      - name: Build static export
        working-directory: apps/web_landing
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: landing-out
          path: apps/web_landing/out
          retention-days: 1

  # ── 2. Preview (PRs only — temporary Firebase channel) ─────────────────────
  deploy-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-out
          path: apps/web_landing/out

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXORA_STREAMING_PLATFORM }}
          projectId: fluxora-streaming-platform
          # no channelId = auto-creates a preview channel for this PR
          # Firebase posts the preview URL as a PR comment automatically

  # ── 3. UAT (uat branch — auto-deploys, no approval needed) ─────────────────
  deploy-uat:
    needs: build
    if: github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    environment:
      name: uat
      url: https://uat.fluxora.marshalx.dev
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-out
          path: apps/web_landing/out

      - name: Deploy to UAT channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXORA_STREAMING_PLATFORM }}
          channelId: uat
          expires: 30d
          projectId: fluxora-streaming-platform

  # ── 4. Production (main branch — requires approval in GitHub Environments) ──
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://fluxora.marshalx.dev
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: landing-out
          path: apps/web_landing/out

      - name: Deploy to live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLUXORA_STREAMING_PLATFORM }}
          channelId: live
          projectId: fluxora-streaming-platform
