name: Desktop CI
on:
  push:
    paths:
      - 'apps/desktop/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.3'  # Dart 3.11.x — needed for json_annotation 4.11+ and go_router 17+
          cache: true
      - run: flutter pub get
        working-directory: packages/fluxora_core
      - run: flutter pub get
        working-directory: apps/desktop
      - run: flutter analyze
        working-directory: apps/desktop
      - run: flutter test --exclude-tags=golden
        working-directory: apps/desktop
