name: Desktop CI
on:
  push:
    paths:
      - 'apps/desktop/**'
      - 'packages/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: flutter-actions/setup-flutter@v4
      - run: flutter pub get
        working-directory: apps/desktop
      - run: flutter analyze
        working-directory: apps/desktop
      - run: flutter test
        working-directory: apps/desktop
