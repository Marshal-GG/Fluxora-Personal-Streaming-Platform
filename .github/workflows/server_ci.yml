name: Server CI
on:
  push:
    paths:
      - 'apps/server/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r apps/server/requirements-dev.txt
      - run: pytest apps/server/tests/ -v
