name: Mirror to Public Repo

on:
  push:
    branches: [main]

concurrency:
  # Mirror is force-push; never cancel an in-flight run mid-sync, just queue.
  group: mirror-public
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private files and references
        run: |
          # 1. Delete private files
          rm -f AGENT_LOG.md
          rm -f CLAUDE.md
          rm -f CONTRIBUTING.md
          rm -rf docs/logs
          rm -rf docs/12_guidelines

          # 2. Remove ALL workflows — public repo is a code mirror only, no CI runs there
          rm -rf .github/workflows/

          # 3. Remove the entire "For AI Agents" section from the root README.md
          sed -i '/## For AI Agents/,$d' README.md 2>/dev/null || true

          # 4. Globally delete any line containing "AGENT_LOG", "CLAUDE.md", or "CONTRIBUTING.md" in ALL markdown files
          find . -name "*.md" -type f -exec sed -i '/AGENT_LOG/d' {} +
          find . -name "*.md" -type f -exec sed -i '/CLAUDE\.md/d' {} +
          find . -name "*.md" -type f -exec sed -i '/CONTRIBUTING\.md/d' {} +

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build clean commit message
        id: msg
        run: |
          # Get the original commit message, strip any agent/log references
          RAW=$(git log -1 --pretty=%B)
          CLEAN=$(echo "$RAW" | grep -iv "agent_log\|claude\.md\|agent log\|agent session" || echo "chore: update")
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Stage filtered files
        run: |
          git rm -r --cached AGENT_LOG.md CLAUDE.md docs/logs docs/12_guidelines .github/workflows/ --ignore-unmatch
          git add -A

      - name: Commit clean state
        env:
          # Pass the message via env so the workflow doesn't break when the
          # message body contains quotes, parens, backticks, or other shell
          # metacharacters. Reading from stdin via `git commit -F -` is the
          # safest way to handle multiline content.
          COMMIT_MSG: ${{ steps.msg.outputs.message }}
        run: |
          if ! git diff --cached --quiet; then
            printf '%s\n' "$COMMIT_MSG" | git commit -F -
          fi

      - name: Push to public repo
        run: |
          git remote add public https://Marshal-GG:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Marshal-GG/Fluxora-Personal-Streaming-Platform.git
          git push public main --force
