<?xml version="1.0" encoding="UTF-8"?>
<!--
  Section icon: Tech stack — three stacked layers (server / clients /
  shared core) in Fluxora's violet→cyan palette. SMIL animations: gentle
  vertical float + glow pulse.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="22" height="22">
  <style>
    @keyframes sGlow  { 0%,100%{filter:drop-shadow(0 0 3px #A855F755)} 50%{filter:drop-shadow(0 0 7px #A855F7aa)} }
    @keyframes sFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.5px)} }
    .sg { animation:sGlow 2.5s ease-in-out infinite; }
    .sf { animation:sFloat 3s ease-in-out infinite; }
  </style>
  <g class="sg"><g class="sf">
    <path d="M4 22 L16 28 L28 22 L16 16Z" fill="#6D28D9" stroke="#8B5CF6" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M4 16 L16 22 L28 16 L16 10Z" fill="#7C3AED" stroke="#A855F7" stroke-width="0.8" stroke-linejoin="round"/>
    <path d="M4 10 L16 16 L28 10 L16 4Z"  fill="#A855F7" stroke="#22D3EE" stroke-width="1"   stroke-linejoin="round"/>
  </g></g>
</svg>
