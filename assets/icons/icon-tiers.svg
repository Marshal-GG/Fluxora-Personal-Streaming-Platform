<?xml version="1.0" encoding="UTF-8"?>
<!--
  Section icon: Pricing / tiers — a tag with a glowing dot, evoking a
  price label. Violet stroke, glow pulse.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <defs>
    <style>
      @keyframes pulse { 0%,100%{opacity:.7;filter:drop-shadow(0 0 2px #A855F7)} 50%{opacity:1;filter:drop-shadow(0 0 6px #A855F7)} }
      .ic { animation: pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <g class="ic" fill="none" stroke="#A855F7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 2 L20 2 L20 11 L11 20 L2 11 Z"/>
    <circle cx="15.5" cy="6.5" r="1.4" fill="#A855F7" stroke="none"/>
  </g>
</svg>
