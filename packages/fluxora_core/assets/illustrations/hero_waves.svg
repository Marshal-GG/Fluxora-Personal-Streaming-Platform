<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero waves — decorative flowing-line backdrop for hero / empty-state areas.

  Visually mirrors the wave texture on the left side of
  docs/11_design/ref images/brand/brand_banner_horizontal.png. Five layered
  cubic-bezier curves with a violet→cyan gradient stroke. Each wave has its
  own SMIL <animate> on stroke-dashoffset so the dashes drift through the
  curve, plus a longer offset cycle on the gradient transform so the colour
  flow shifts independently. Net effect: a slowly breathing, never-quite-
  repeating wave field — the kind of visual Flutter could produce only with
  multiple AnimationControllers + custom paths.

  Designed for 800×400 viewBox; scales arbitrarily. Renders inside flutter_svg.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     preserveAspectRatio="xMidYMid slice"
     fill="none">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%"
                    gradientUnits="userSpaceOnUse"
                    x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%"   stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#A855F7" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#C084FC" stop-opacity="0.85"/>
      <stop offset="80%"  stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform"
                        type="translate"
                        from="-200 0" to="200 0"
                        dur="14s"
                        repeatCount="indefinite"/>
    </linearGradient>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <g stroke="url(#waveGradient)" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M -50 220 C 100 160, 220 280, 360 220 S 620 160, 850 240"
          stroke-width="1.2"
          stroke-dasharray="6 12"
          opacity="0.9">
      <animate attributeName="stroke-dashoffset"
               from="0" to="-180"
               dur="9s"
               repeatCount="indefinite"/>
    </path>

    <path d="M -50 240 C 120 200, 260 300, 420 250 S 660 190, 850 260"
          stroke-width="1.2"
          stroke-dasharray="4 10"
          opacity="0.7">
      <animate attributeName="stroke-dashoffset"
               from="0" to="-140"
               dur="11s"
               repeatCount="indefinite"/>
    </path>

    <path d="M -50 270 C 140 230, 290 320, 460 270 S 700 220, 850 290"
          stroke-width="1.0"
          stroke-dasharray="3 8"
          opacity="0.55">
      <animate attributeName="stroke-dashoffset"
               from="0" to="-120"
               dur="13s"
               repeatCount="indefinite"/>
    </path>

    <path d="M -50 300 C 160 270, 320 350, 500 300 S 720 250, 850 320"
          stroke-width="0.9"
          stroke-dasharray="2 7"
          opacity="0.4">
      <animate attributeName="stroke-dashoffset"
               from="0" to="-100"
               dur="15s"
               repeatCount="indefinite"/>
    </path>

    <path d="M -50 340 C 180 310, 350 380, 540 330 S 740 290, 850 360"
          stroke-width="0.8"
          stroke-dasharray="2 6"
          opacity="0.28">
      <animate attributeName="stroke-dashoffset"
               from="0" to="-80"
               dur="17s"
               repeatCount="indefinite"/>
    </path>
  </g>
</svg>
