<?xml version="1.0" encoding="UTF-8"?>
<!--
  Empty-state illustration: Clients screen "No clients connected".

  A faded device silhouette (phone + laptop + TV stacked) with a violet
  signal-arc reaching out from a small server hub on the left — the visual
  metaphor is "we're broadcasting, but nobody's tuned in yet." A pulse
  animation on the signal arc keeps the screen feeling alive without
  drawing focus.

  ViewBox: 280×180.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 280 180"
     fill="none">
  <defs>
    <linearGradient id="deviceFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1E1A36"/>
      <stop offset="100%" stop-color="#0A0817"/>
    </linearGradient>
    <linearGradient id="deviceScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Hub glow (left) -->
  <circle cx="48" cy="90" r="48" fill="url(#hubGlow)">
    <animate attributeName="r" values="44;52;44" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Server hub icon -->
  <g transform="translate(48 90)">
    <rect x="-14" y="-18" width="28" height="36" rx="3"
          fill="url(#deviceFrame)"
          stroke="rgba(168,85,247,0.55)" stroke-width="1.2"/>
    <line x1="-9" y1="-10" x2="9" y2="-10" stroke="#C4A8F5" stroke-width="1"/>
    <line x1="-9" y1="-2"  x2="9" y2="-2"  stroke="#C4A8F5" stroke-width="1" opacity="0.7"/>
    <line x1="-9" y1="6"   x2="9" y2="6"   stroke="#C4A8F5" stroke-width="1" opacity="0.5"/>
    <circle cx="9" cy="14" r="1.6" fill="#10B981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Signal arcs reaching out from hub -->
  <g stroke="#A855F7" fill="none" stroke-linecap="round">
    <path d="M 80 90 Q 110 60, 140 90" stroke-width="1.4" opacity="0.55">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 80 90 Q 130 50, 180 90" stroke-width="1.2" opacity="0.4">
      <animate attributeName="opacity"
               values="0.1;0.55;0.1" dur="2.2s" begin="-0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 80 90 Q 150 40, 220 90" stroke-width="1.0" opacity="0.3">
      <animate attributeName="opacity"
               values="0;0.4;0" dur="2.2s" begin="-1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Faded devices on the right (no client connected — desaturated) -->
  <g opacity="0.45">
    <!-- Phone -->
    <rect x="158" y="58" width="22" height="38" rx="3"
          fill="url(#deviceFrame)"
          stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="161" y="62" width="16" height="26" rx="1"
          fill="url(#deviceScreen)"/>

    <!-- Laptop -->
    <rect x="186" y="66" width="36" height="22" rx="2"
          fill="url(#deviceFrame)"
          stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="189" y="69" width="30" height="16" rx="1"
          fill="url(#deviceScreen)"/>
    <rect x="184" y="88" width="40" height="2" rx="1"
          fill="url(#deviceFrame)"
          stroke="rgba(255,255,255,0.06)"/>

    <!-- TV -->
    <rect x="228" y="62" width="36" height="26" rx="2"
          fill="url(#deviceFrame)"
          stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <rect x="231" y="65" width="30" height="20" rx="1"
          fill="url(#deviceScreen)"/>
    <line x1="240" y1="92" x2="252" y2="92"
          stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  </g>

  <!-- Subtle "?" hint over the devices -->
  <text x="221" y="44"
        font-family="Inter, sans-serif"
        font-size="14"
        font-weight="600"
        fill="rgba(196,168,245,0.70)"
        text-anchor="middle">?</text>
</svg>
