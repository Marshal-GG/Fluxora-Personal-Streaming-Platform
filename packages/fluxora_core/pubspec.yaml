name: fluxora_core
description: Shared Dart entities, network client, storage, and design tokens
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  logger: ^2.7.0
  connectivity_plus: ^7.1.1
  equatable: ^2.0.8
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.0
  freezed: ^3.0.0
  json_serializable: ^6.13.0
  mocktail: ^1.0.5

flutter:
  assets:
    - assets/brand/
    - assets/illustrations/
