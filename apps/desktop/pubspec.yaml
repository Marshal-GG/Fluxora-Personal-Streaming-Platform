name: fluxora_desktop
description: Fluxora desktop control panel for Windows, macOS, and Linux
version: 0.1.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  fluxora_core:
    path: ../../packages/fluxora_core
  flutter_bloc: ^9.1.1
  go_router: ^13.0.0
  get_it: ^7.6.7
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.5
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
