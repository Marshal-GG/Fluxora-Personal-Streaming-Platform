name: fluxora_desktop
description: Fluxora desktop control panel for Windows, macOS, and Linux
version: 0.1.0+1
publish_to: none

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  fluxora_core:
    path: ../../packages/fluxora_core
  flutter_bloc: ^9.1.1
  go_router: ^17.2.2
  get_it: ^9.2.1
  logger: ^2.7.0
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.8
  intl: ^0.20.2
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  file_picker: ^11.0.2
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3
  bloc_test: ^10.0.0
  build_runner: ^2.14.0
  freezed: ^3.0.0
  json_serializable: ^6.13.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
