# Test configuration for apps/desktop.
#
# The `golden` tag is skipped by default: golden tests need extra setup
# (registering mock repositories in GetIt before pumping the widget,
# since DashboardScreen creates its cubits via `GetIt.I<>()` rather
# than reading them from a parent BlocProvider). See test/goldens/_README.md
# for the fix recipe and how to run goldens locally.
#
# To run goldens:    flutter test --tags=golden test/goldens/
# To regenerate:     flutter test --tags=golden --update-goldens test/goldens/

tags:
  golden:
    skip: "Golden tests need GetIt mock-registration in setUp; tracked in test/goldens/_README.md"
